    }

    }

      font-weight: 600;
      margin: 0.5rem 0 0.4rem;
    }

      margin-top: 0.5rem;

    .card {

      margin-bottom: 0.15rem;

  // --- INIT UI --------------------------------------------------------

  const tabsContainer = document.getElementById("tabs");
  const content = document.getElementById("content");

  function init() {
    renderTabs();
    renderWeekTab(1); // default
  }

  function renderTabs() {
    tabsContainer.innerHTML = "";

    // Week tabs
    PLAN.forEach(weekObj => {
      const btn = document.createElement("button");
      btn.className = "tab-btn";
      btn.textContent = Week ${weekObj.week};
      btn.dataset.tab = week-${weekObj.week};
      btn.addEventListener("click", () => {
        setActiveTab(week-${weekObj.week});
        renderWeekTab(weekObj.week);
      });
      tabsContainer.appendChild(btn);
    });

    // Progress tab
    const progressBtn = document.createElement("button");
    progressBtn.className = "tab-btn";
    progressBtn.textContent = "Progress & Times";
    progressBtn.dataset.tab = "progress";
    progressBtn.addEventListener("click", () => {
      setActiveTab("progress");
      renderProgressTab();
    });
    tabsContainer.appendChild(progressBtn);

    // Set first active
    const first = tabsContainer.querySelector(".tab-btn");
    if (first) first.classList.add("active");
  }

  function setActiveTab(tabId) {
    // buttons
    tabsContainer.querySelectorAll(".tab-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.tab === tabId);
    });
  }

  // --- WEEK TAB RENDERING ---------------------------------------------

  function renderWeekTab(weekNumber) {
    const weekObj = PLAN.find(w => w.week === weekNumber);
    if (!weekObj) return;

    content.innerHTML = "";

    const wrapper = document.createElement("div");
    wrapper.className = "tab-content active";

    const title = document.createElement("h2");
    title.className = "section-title";
    title.textContent = Week ${weekObj.week} – ${weekObj.block};
    wrapper.appendChild(title);

    // Week progress
    const weekKey = week-${weekObj.week};
    const totalDays = weekObj.days.length;
    const completedDays = weekObj.days.filter((day, idx) =>
      isDayChecked(weekObj.week, idx)
    ).length;
    const weekProgress = document.createElement("div");
    weekProgress.className = "week-progress";
    weekProgress.innerHTML = `
      Week completion: ${completedDays}/${totalDays}
      <div class="progress-bar">
        <div class="progress-bar-inner" style="width:${(completedDays / totalDays) * 100}%"></div>
      </div>
    `;
    wrapper.appendChild(weekProgress);

    weekObj.days.forEach((day, index) => {
      const dayDiv = document.createElement("div");
      dayDiv.className = "day";

      const header = document.createElement("div");
      header.className = "day-header";

      const left = document.createElement("div");
      left.innerHTML = `
        <div class="day-name">${day.name}</div>
        <div class="day-type">${day.type}</div>
      `;

      const right = document.createElement("div");
      right.className = "check-row";
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = isDayChecked(weekObj.week, index);
      cb.addEventListener("change", () => {
        setDayChecked(weekObj.week, index, cb.checked);
        renderWeekTab(weekObj.week); // re-render to update progress bar
      });
      const label = document.createElement("span");
      label.textContent = "Completed";

      right.appendChild(cb);
      right.appendChild(label);

      header.appendChild(left);
      header.appendChild(right);

      const text = document.createElement("div");
      text.className = "workout-text";
      text.textContent = day.text;

      dayDiv.appendChild(header);
      dayDiv.appendChild(text);

      wrapper.appendChild(dayDiv);
    });

    content.appendChild(wrapper);
  }

  // --- PROGRESS TAB RENDERING -----------------------------------------

  function renderProgressTab() {
    content.innerHTML = "";

    const wrapper = document.createElement("div");
    wrapper.className = "tab-content active";

    // Logging card
    const logTitle = document.createElement("h2");
    logTitle.className = "section-title";
    logTitle.textContent = "Race Time Logging";
    wrapper.appendChild(logTitle);

    const logCard = document.createElement("div");
    logCard.className = "card";

    logCard.innerHTML = `
      <p>Log your best estimated race-pace times for each discipline. Times are in minutes and seconds.</p>
      <div class="log-grid">
        <div>
          <label>Swim 1500m</label>
          <div class="inline-inputs">
            <div>
              <input type="number" id="swim-min" min="0" placeholder="min" />
            </div>
            <div>
              <input type="number" id="swim-sec" min="0" max="59" placeholder="sec" />
            </div>
          </div>
          <div class="small">Goal: ~${formatTime(GOAL_SPLITS.swim)}</div>
        </div>
        <div>
          <label>Bike 40km</label>
          <div class="inline-inputs">
            <div>
              <input type="number" id="bike-min" min="0" placeholder="min" />
            </div>
            <div>
              <input type="number" id="bike-sec" min="0" max="59" placeholder="sec" />
            </div>
          </div>
          <div class="small">Goal: ~${formatTime(GOAL_SPLITS.bike)}</div>
        </div>
        <div>
          <label>Run 10km</label>
          <div class="inline-inputs">
            <div>
              <input type="number" id="run-min" min="0" placeholder="min" />
            </div>
            <div>
              <input type="number" id="run-sec" min="0" max="59" placeholder="sec" />
            </div>
          </div>
          <div class="small">Goal: ~${formatTime(GOAL_SPLITS.run)}</div>
        </div>
        <div>
          <label>Transitions (T1 + T2)</label>
          <div class="inline-inputs">
            <div>
              <input type="number" id="tran-min" min="0" placeholder="min" />
            </div>
            <div>
              <input type="number" id="tran-sec" min="0" max="59" placeholder="sec" />
            </div>
          </div>
          <div class="small">Goal: ~${formatTime(GOAL_SPLITS.transitions)}</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="primary" id="save-times">Save Times</button>
        <button class="secondary" id="reset-times">Reset Times</button>
      </div>
    `;

    wrapper.appendChild(logCard);

    // Progress card
    const progTitle = document.createElement("h2");
    progTitle.className = "section-title";
    progTitle.textContent = "Goal Progress (3:00:00 Total)";
    wrapper.appendChild(progTitle);

    const progCard = document.createElement("div");
    progCard.className = "card";

    const current = getCurrentTimesSeconds();
    const totalCurrent = current.swim + current.bike + current.run + current.transitions;
    const totalGoal = GOALTOTALSECONDS;

    progCard.innerHTML = `
      <div class="metric-row">
        <div class="metric-label">Goal Finish Time</div>
        <div class="metric-value">${formatTime(totalGoal)}</div>
      </div>
      <div class="metric-row">
        <div class="metric-label">Your Current Estimate</div>
        <div class="metric-value">${current.swim === 0 && current.bike === 0 && current.run === 0 && current.transitions === 0 ? "—" : formatTime(totalCurrent)}</div>
      </div>
      <div class="metric-bar">
        <div class="metric-bar-inner" id="total-bar"></div>
      </div>
      <div class="small">Bar shows how close your current estimate is to the 3:00:00 goal (lower is better).</div>
      <hr style="margin:0.6rem 0;border:none;border-top:1px solid #e9ecef;">
      <div id="split-metrics"></div>
    `;

    wrapper.appendChild(progCard);
    content.appendChild(wrapper);

    // Populate inputs from stored times
    setTimeInputsFromState();

    // Attach handlers
    document.getElementById("save-times").addEventListener("click", () => {
      saveTimesFromInputs();
      renderProgressTab(); // re-render to update bars
    });
    document.getElementById("reset-times").addEventListener("click", () => {
      times = { swim: 0, bike: 0, run: 0, transitions: 0 };
      saveTimes();
      renderProgressTab();
    });

    // Update bars
    const totalBar = document.getElementById("total-bar");
    const ratio = totalCurrent > 0 ? Math.min(totalGoal / totalCurrent, 1) : 0;
    totalBar.style.width = ${ratio * 100}%;

    // Split metrics
    const splitContainer = document.getElementById("split-metrics");
    splitContainer.innerHTML = "";

    const splits = [
      { key: "swim", label: "Swim 1500m", goal: GOAL_SPLITS.swim, value: current.swim },
      { key: "bike", label: "Bike 40km", goal: GOAL_SPLITS.bike, value: current.bike },
      { key: "run", label: "Run 10km", goal: GOAL_SPLITS.run, value: current.run },
      { key: "transitions", label: "Transitions", goal: GOAL_SPLITS.transitions, value: current.transitions }
    ];

    splits.forEach(s => {
      const row = document.createElement("div");
      row.innerHTML = `
        <div class="metric-row">
          <div class="metric-label">${s.label}</div>
          <div class="metric-value">${s.value === 0 ? "—" : formatTime(s.value)} (goal ${formatTime(s.goal)})</div>
        </div>
        <div class="metric-bar">
          <div class="metric-bar-inner" style="width:${s.value > 0 ? Math.min(s.goal / s.value, 1) * 100 : 0}%"></div>
        </div>
      `;
      splitContainer.appendChild(row);
    });
  }

  // --- CHECK STORAGE --------------------------------------------------

  function loadChecks() {
    try {
      const raw = localStorage.getItem(STORAGEKEYCHECKS);
      return raw ? JSON.parse(raw) : {};
    } catch {
      return {};
    }
  }

  function saveChecks() {
    localStorage.setItem(STORAGEKEYCHECKS, JSON.stringify(checks));
  }

  function isDayChecked(week, dayIndex) {
    const key = w${week}-d${dayIndex};
    return !!checks[key];
  }

  function setDayChecked(week, dayIndex, value) {
    const key = w${week}-d${dayIndex};
    checks[key] = value;
    saveChecks();
  }

  // --- TIME STORAGE ---------------------------------------------------

  function loadTimes() {
    try {
      const raw = localStorage.getItem(STORAGEKEYTIMES);
      return raw ? JSON.parse(raw) : { swim: 0, bike: 0, run: 0, transitions: 0 };
    } catch {
      return { swim: 0, bike: 0, run: 0, transitions: 0 };
    }
  }

  function saveTimes() {
    localStorage.setItem(STORAGEKEYTIMES, JSON.stringify(times));
  }

  function getCurrentTimesSeconds() {
    return {
      swim: times.swim || 0,
      bike: times.bike || 0,
      run: times.run || 0,
      transitions: times.transitions || 0
    };
  }

  function setTimeInputsFromState() {
    const cur = getCurrentTimesSeconds();
    const fields = [
      { key: "swim", minId: "swim-min", secId: "swim-sec" },
      { key: "bike", minId: "bike-min", secId: "bike-sec" },
      { key: "run", minId: "run-min", secId: "run-sec" },
      { key: "transitions", minId: "tran-min", secId: "tran-sec" }
    ];
    fields.forEach(f => {
      const total = cur[f.key];
      const mins = Math.floor(total / 60);
      const secs = total % 60;
      const minEl = document.getElementById(f.minId);
      const secEl = document.getElementById(f.secId);
      if (minEl && secEl) {
        minEl.value = total ? mins : "";
        secEl.value = total ? secs : "";
      }
    });
  }

  function saveTimesFromInputs() {
    const fields = [
      { key: "swim", minId: "swim-min", secId: "swim-sec" },
      { key: "bike", minId: "bike-min", secId: "bike-sec" },
      { key: "run", minId: "run-min", secId: "run-sec" },
      { key: "transitions", minId: "tran-min", secId: "tran-sec" }
    ];
    fields.forEach(f => {
      const minEl = document.getElementById(f.minId);
      const secEl = document.getElementById(f.secId);
      const mins = parseInt(minEl.value || "0", 10);
      const secs = parseInt(secEl.value || "0", 10);
      const total = Math.max(0, mins * 60 + secs);
      times[f.key] = total;
    });
    saveTimes();
  }

  // --- UTIL -----------------------------------------------------------

  function formatTime(seconds) {
    const s = Math.max(0, Math.round(seconds));
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) {
      return ${h}:${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")};
    }
    return ${m}:${String(sec).padStart(2, "0")};
  }

  // --- START ----------------------------------------------------------

  init();
</script>
</body>
</html>
`
